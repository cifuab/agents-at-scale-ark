apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: global-ttl-fallback
  labels:
    etcd-only: "true"
spec:
  description: When no ArkConfig exists, a Query without spec.ttl falls back to 720h
  steps:
  - name: ensure-no-arkconfig
    try:
    - script:
        content: |
          kubectl delete arkconfig default --ignore-not-found
  - name: apply-and-assert-fallback-ttl
    try:
    - apply:
        file: manifests/a00-rbac.yaml
    - apply:
        file: manifests/a01-agent.yaml
    - apply:
        file: manifests/a02-query.yaml
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            name: test-query-fallback-ttl
          spec:
            ttl: 720h0m0s
    catch:
    - events: {}
    - describe:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: test-query-fallback-ttl

    cleanup:
    - script:
        content: |
          kubectl delete arkconfig default --ignore-not-found
