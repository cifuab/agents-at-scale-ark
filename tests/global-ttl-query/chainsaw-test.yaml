apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: global-ttl-query
  labels:
    etcd-only: "true"
spec:
  description: ArkConfig queryTTL is injected into Query resources with no spec.ttl
  steps:
  - name: apply-and-assert-ttl-injected
    try:
    - apply:
        file: manifests/a00-rbac.yaml
    - apply:
        file: manifests/a01-arkconfig.yaml
    - apply:
        file: manifests/a02-agent.yaml
    - apply:
        file: manifests/a03-query.yaml
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            name: test-query-global-ttl
          spec:
            ttl: 1h0m0s
    catch:
    - events: {}
    - describe:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: test-query-global-ttl

    cleanup:
    - script:
        content: |
          kubectl delete arkconfig default --ignore-not-found
