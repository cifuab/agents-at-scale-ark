apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: global-ttl-override
  labels:
    etcd-only: "true"
spec:
  description: Explicit spec.ttl on a Query is preserved when ArkConfig also sets queryTTL
  steps:
  - name: apply-and-assert-explicit-ttl-preserved
    try:
    - apply:
        file: manifests/a00-rbac.yaml
    - apply:
        file: manifests/a01-arkconfig.yaml
    - apply:
        file: manifests/a02-agent.yaml
    - apply:
        file: manifests/a03-query.yaml
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            name: test-query-override-ttl
          spec:
            ttl: 5m0s
    catch:
    - events: {}
    - describe:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: test-query-override-ttl

    cleanup:
    - script:
        content: |
          kubectl delete arkconfig default --ignore-not-found
