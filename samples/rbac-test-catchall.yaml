apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ark-all-editor-role
rules:
  - apiGroups: ["ark.mckinsey.com"]
    resources: ["agents", "models", "queries", "teams", "tools", "memories", "mcpservers", "a2aservers", "a2atasks", "executionengines"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ark-all-viewer-role
rules:
  - apiGroups: ["ark.mckinsey.com"]
    resources: ["agents", "models", "queries", "teams", "tools", "memories", "mcpservers", "a2aservers", "a2atasks", "executionengines"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ark-admin-all
  namespace: default
subjects:
  - kind: Group
    name: ark-admin
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: ark-all-editor-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ark-viewers-all
  namespace: default
subjects:
  - kind: Group
    name: ark-viewers
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: ark-all-viewer-role
  apiGroup: rbac.authorization.k8s.io
