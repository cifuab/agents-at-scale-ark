{{- if .Values.rbac.enable }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    {{- include "chart.labels" . | nindent 4 }}
  name: a2atask-viewer-role
rules:
- apiGroups:
  - ark.mckinsey.com
  resources:
  - a2atasks
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ark.mckinsey.com
  resources:
  - a2atasks/status
  verbs:
  - get
{{- end -}}
